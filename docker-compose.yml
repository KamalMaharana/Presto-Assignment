services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gin-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      LOG_LEVEL: info
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: appdb
      DB_SSLMODE: disable
      DB_CONNECT_RETRIES: 10
      DB_CONNECT_RETRY_DELAY_SECONDS: 2
    ports:
      - "8080:8080"
    command: ["/bin/sh", "-c", "./migrate up && ./server"]

  postgres:
    image: postgres:17-alpine
    container_name: gin-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
